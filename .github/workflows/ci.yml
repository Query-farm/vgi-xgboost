name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Allow the publish workflow (docker-publish.yml) to gate on this suite.
  workflow_call: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint • types • unit • sql
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install (package + dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy

      - name: Unit tests
        run: pytest tests/ -o "addopts=" -q --ignore=tests/test_sql_haybarn.py

      - name: SQL integration tests (haybarn + vgi community extension)
        env:
          VGI_SQL_HAYBARN: "1"
          VGI_SIGNING_KEY: dev
        run: pytest tests/test_sql_haybarn.py -o "addopts=" -q

  lint-metadata:
    name: vgi-lint-check (metadata quality)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Install the worker
        run: uv venv && uv pip install -e .
      # Two passes, no severity overrides:
      #   1. static (execute: false), fail-on: warning — strict metadata gate
      #      (every description/tag/example/column-doc warning fails CI).
      #   2. execute, fail-on: error — runs every example's SQL live; a binding
      #      failure (or a broken vgi.executable_examples block) is an error and
      #      fails CI, while a purely illustrative runtime/return-rows warning
      #      does not. The handful of examples that read a *stored* model at bind
      #      (predict etc.) are scoped out via [tool.vgi-lint-check.per_object] in
      #      pyproject.
      - name: Lint worker metadata (static)
        uses: Query-farm/vgi-lint-check@v1
        with:
          # vgi-lint spawns this as a subprocess. Point at the venv interpreter
          # by path (not bare `python`): the action runs vgi-lint under uvx,
          # whose isolated env would otherwise shadow `python` and miss the
          # worker's deps (ModuleNotFoundError: No module named 'vgi').
          location: .venv/bin/python xgboost_worker.py
          execute: false
          fail-on: warning
      - name: Lint worker examples (execute)
        uses: Query-farm/vgi-lint-check@v1
        with:
          location: .venv/bin/python xgboost_worker.py
          execute: true
          fail-on: error
