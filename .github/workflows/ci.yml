name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint • types • unit • sql
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install (package + dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy

      - name: Unit tests
        run: pytest tests/ -o "addopts=" -q --ignore=tests/test_sql_haybarn.py

      - name: SQL integration tests (haybarn + vgi community extension)
        env:
          VGI_SQL_HAYBARN: "1"
          VGI_SIGNING_KEY: dev
        run: pytest tests/test_sql_haybarn.py -o "addopts=" -q

  docker:
    name: docker build • smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build --build-arg GIT_COMMIT=${GITHUB_SHA::8} -t vgi-xgboost:ci .

      - name: Smoke test (imports + HTTP /health)
        run: |
          docker run --rm -e VGI_SIGNING_KEY=dev vgi-xgboost:ci \
            python -c "from xgboost_worker import XGBoostWorker; import serve; print('imports OK')"
          CID=$(docker run -d -e VGI_SIGNING_KEY=dev -p 18000:8000 vgi-xgboost:ci)
          trap "docker rm -f $CID >/dev/null" EXIT
          for i in $(seq 1 15); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:18000/health || true)
            case "$code" in 200|401|403|404) echo "HTTP server responding ($code)"; exit 0;; esac
            sleep 1
          done
          echo "container did not respond on /health" >&2
          docker logs "$CID" >&2
          exit 1
